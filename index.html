<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <title>Portifólio do Leo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  background: radial-gradient(circle, #1a1a1a 60%, #004422 100%);
color: #ffffff;
font-family: Arial, sans-serif;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100vh;
margin: 0;
}
h1 {
    color: #00ff88;
}
/* NOVOS ESTILOS */
    .links {
        margin-top: 20px;
        display: flex;
        gap: 15px;
    }

    .botao {
        background-color: #00ff88;
        color: #1a1a1a;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        transition: 0.3s;
        display: flex;       /* Adicione isso para alinhar ícone e texto */
        align-items: center; /* Centraliza o ícone verticalmente */
    }

    .botao i {
        margin-right: 8px; /* O espaço exato que você queria */
    }

    .botao:hover {
        background-color: #ffffff;
        color: #000000;
        transform: scale(1.05);
        box-shadow: 0 0 20px #00ff88;
    }
@media (max-width: 600px) {
 body {
    padding: 20px;
    justify-content:center;
 }
 .links {
            flex-direction: column;
            width: 100%;
            align-items: center;
        }
 .botao {
    width: 80%; /*Botões maiores para o polegar */
    text-align: center;
   }
}
</style>
</head>
<body>
    <h1>Leonardo Borges</h1>
 <p>Aprendendo, criando e evoluindo no mundo da programação.</p>
   <div class="links">
<a href="https://www.linkedin.com/in/leonardo-borges-74214b389/" target="_blank" class="botao"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
<a href="https://github.com/LeoBorges-dev" target="_blank" class="botao"><i class="fa-brands fa-github"></i> GitHub</a>
</div>
</body>
</html>

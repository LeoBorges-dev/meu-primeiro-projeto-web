<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portifólio do Leo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  background: radial-gradient(circle, #1a1a1a 60%, #004422 100%);
color: #ffffff;
font-family: Arial, sans-serif;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100vh;
margin: 0;
}
h1 {
    color: #00ff88;
}
/* NOVOS ESTILOS */ 
.links { margin-top: 20px;
display: flex;
gap: 15px;
} 
.botao {
    background-color: #00ff88;
    color: #1a1a1a;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
    transition: 0.3s;
} 
.botao:hover {
    background-color: #ffffff;
    transform: scale(1.1);
}/* Ajustes para Celular */
@media (max-width: 600px) {
 body {
    padding: 20px;
    justify-content:center;
 }
 .links {
            flex-direction: column;
            width: 100%;
            align-items: center;
        }
 .botao {
    width: 80%; /*Botões maiores para o polegar */
    text-align: center;
   }
}
</style>
</head>
<body>

    <p>Estudante de Tecnologia.</p>
